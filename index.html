<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>José Alberto😎</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginBox" class="box">
<h1>José Alberto😎</h1>

<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>
<button onclick="register()">Criar conta</button>
<button onclick="reset()">Esqueci senha</button>

<button onclick="abrirSuporte()">📩 Suporte</button>
<button onclick="pedirReset()">🔑 Pedir acesso</button>
</div>

<div id="app" class="box" style="display:none">

<h2>Painel</h2>
<p id="info"></p>

<button onclick="logout()">Sair</button>

<h3>☁️ Drive</h3>
<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>
<ul id="arquivos"></ul>

<h3>📩 Suporte</h3>
<button onclick="enviarSuporte()">Enviar</button>
<ul id="minhasMsgs"></ul>

<h3 id="adminArea" style="display:none">👑 Admin</h3>

<h4>Usuários</h4>
<ul id="lista"></ul>

<h4>Mensagens</h4>
<ul id="msgs"></ul>

<h4>Reset</h4>
<ul id="resetList"></ul>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
