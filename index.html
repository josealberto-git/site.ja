<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>José Alberto😎</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="matrix"></canvas>

<div id="loginBox" class="box">
<h1>José Alberto😎</h1>

<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>

<button onclick="login()">🔐 Entrar</button>

<p>Não tem conta?</p>
<button onclick="register()">📝 Criar conta</button>

<button onclick="reset()">🔑 Esqueci senha</button>

<div>
<button onclick="abrirSuporte()">📩 Suporte</button>
<button onclick="pedirReset()">👑 Pedir acesso</button>
</div>
</div>

<div id="app" class="box" style="display:none">

<h2>Painel</h2>
<p id="info"></p>
<p>🌐 IP: <span id="ip"></span></p>

<button onclick="logout()">Sair</button>

<!-- DRIVE -->
<h3>☁️ Drive</h3>
<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>
<ul id="arquivos"></ul>

<!-- SUPORTE -->
<h3>📩 Suporte</h3>
<button onclick="enviarSuporte()">Enviar</button>
<ul id="minhasMsgs"></ul>

<!-- ADMIN -->
<h3 id="adminArea" style="display:none">👑 Admin</h3>

<ul id="lista"></ul>

<h3>📩 Suporte Admin</h3>
<ul id="msgs"></ul>

<h3>🔑 Reset</h3>
<ul id="resetList"></ul>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
